name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        filament: ['4.*', '5.*']
        stability: [prefer-stable]
        exclude:
          # Filament v5 requires Laravel 11.28+; we only ship v5 on the 12.* leg.
          - filament: '5.*'
            laravel: '11.*'
        include:
          - php: '8.3'
            laravel: '12.*'
            filament: '5.*'
            stability: prefer-stable
            coverage: true
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, intl, sqlite3
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: composer test

      - name: Upload coverage
        if: matrix.coverage == true
        run: composer test:coverage || true
